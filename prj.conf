CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_LOG=y
CONFIG_DISPLAY=y

CONFIG_NO_OPTIMIZATIONS=n
CONFIG_SPEED_OPTIMIZATIONS=y

CONFIG_GPIO=y
CONFIG_INPUT=y


CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_SMP=y
CONFIG_BT_GATT_CLIENT=y

CONFIG_BT_BONDABLE=y
CONFIG_BT_SETTINGS=y

CONFIG_BT_MAX_PAIRED=1
CONFIG_BT_KEYS_OVERWRITE_OLDEST=y

# For some BLE HID mouses we have to act as a device with input output
# required for bonding
CONFIG_BT_SMP_ENFORCE_MITM=n
CONFIG_BT_SMP_SC_ONLY=n
CONFIG_BT_SMP_SC_PAIR_ONLY=n

CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BUFFER_SIZE=16384
CONFIG_LOG_PROCESS_THREAD=y
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=2048
CONFIG_LOG_PROCESS_THREAD_PRIORITY=5


CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# We need only the internal Flash
CONFIG_SPI_NOR=n

CONFIG_BT_LOG_LEVEL_INF=y

# Onyl for debugging:
#CONFIG_BT_SMP_LOG_LEVEL_DBG=y

#CONFIG_BT_LOG_LEVEL_DBG=y
#CONFIG_SETTINGS_LOG_LEVEL_DBG=y

# Better fatal error diagnostics
CONFIG_DEBUG=y
CONFIG_ASSERT=y
CONFIG_FAULT_DUMP=2

# Print thread names instead of "unknown"
CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y
CONFIG_THREAD_STACK_INFO=y

# Catch stack problems earlier
CONFIG_INIT_STACKS=y
CONFIG_STACK_SENTINEL=y
CONFIG_HW_STACK_PROTECTION=y

# Avoid losing logs on crash
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y

# Coredump to log output
CONFIG_DEBUG_COREDUMP=y
CONFIG_DEBUG_COREDUMP_BACKEND_LOGGING=y
CONFIG_DEBUG_COREDUMP_MEMORY_DUMP_MIN=y


CONFIG_EXCEPTION_STACK_TRACE=y